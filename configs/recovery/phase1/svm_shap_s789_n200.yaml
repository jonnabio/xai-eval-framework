name: rec_p1_exp2_svm_shap_s789_n200
version: '2.0'
dataset: adult
random_seed: 789
model:
  name: adult_svm
  path: experiments/exp1_adult/models/svm.joblib
  type: svm
explainer:
  method: shap
  params:
    n_background_samples: 10
    use_kmeans: true
  explainer_type: kernel
sampling:
  strategy: stratified
  samples_per_class: 200
  random_seed: 789
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/recovery/phase1/results/svm_shap/seed_789/n_200
