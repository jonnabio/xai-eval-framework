name: rec_p1_exp2_mlp_shap_s789_n100
version: '2.0'
dataset: adult
random_seed: 789
model:
  name: adult_mlp
  path: experiments/exp1_adult/models/mlp.joblib
  type: mlp
explainer:
  method: shap
  params:
    n_background_samples: 10
    use_kmeans: true
  explainer_type: kernel
sampling:
  strategy: stratified
  samples_per_class: 100
  random_seed: 789
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/recovery/phase1/results/mlp_shap/seed_789/n_100
