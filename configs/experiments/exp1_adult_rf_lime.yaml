name: "exp1_adult_rf_lime"
description: "Experiment 1: Adult dataset with Random Forest and LIME explanations"
dataset: "adult"
version: "1.0.0"
random_seed: 42

model:
  name: "random_forest"
  path: "experiments/exp1_adult/models/rf_model.pkl"

explainer:
  method: "lime"
  num_features: 10
  num_samples: 1000

sampling:
  strategy: "stratified"
  samples_per_class: 25  # 50 total
  random_seed: 42

metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  stability_perturbations: 10
  stability_noise_level: 0.1

output_dir: "experiments/exp1_adult/results/rf_lime"
