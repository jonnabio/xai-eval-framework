name: "exp1_rf_lime"
dataset: "adult"
description: "Random Forest with LIME explanation"
random_seed: 42
version: "1.0.0"

model:
  name: "rf"
  path: "experiments/exp1_adult/models/rf_model.pkl"

explainer:
  method: "lime"
  params:
    discretize_continuous: true
  num_samples: 1000
  num_features: 10

sampling:
  strategy: "stratified"
  samples_per_class: 50
  random_seed: 42

metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  stability_perturbations: 10
  stability_noise_level: 0.1

output_dir: "experiments/exp1_adult/results/rf_lime"
