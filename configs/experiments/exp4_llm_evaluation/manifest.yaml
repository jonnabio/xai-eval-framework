experiment_family: exp4_llm_evaluation
status: implementation_ready
schema_version: SCHEMA_V1
rubric_version: RUBRIC_V1

case_inventory:
  target_cases: 192
  random_seed: 42
  sources:
    - name: exp2_scaled
      results_root: experiments/exp2_scaled/results
    - name: exp3_cross_dataset
      results_root: experiments/exp3_cross_dataset/results

judges:
  - judge_id: dummy_exp4
    provider: dummy
    model_name: exp4-dummy-judge
    temperature: 0
    max_tokens: 1200
  - judge_id: openai_gpt41
    provider: openai
    model_name: gpt-4.1-2025-04-14
    temperature: 0
    max_tokens: 1200
  - judge_id: openrouter_gpt41
    provider: openrouter
    model_name: openai/gpt-4.1-2025-04-14
    temperature: 0
    max_tokens: 700
  - judge_id: openrouter_gpt41_mini
    provider: openrouter
    model_name: openai/gpt-4.1-mini
    temperature: 0
    max_tokens: 700

prompt_conditions:
  - hidden_label_primary
  - label_visible_bias_probe
  - rubric_alt_sensitivity

replicates: 3

paths:
  cases_dir: experiments/exp4_llm_evaluation/cases
  prompts_dir: experiments/exp4_llm_evaluation/prompts
  raw_responses_dir: experiments/exp4_llm_evaluation/raw_responses
  parsed_scores_dir: experiments/exp4_llm_evaluation/parsed_scores
  run_manifests_dir: experiments/exp4_llm_evaluation/run_manifests
  analysis_dir: outputs/analysis/exp4_llm_evaluation
  log_file: logs/exp4_llm_evaluation.log
