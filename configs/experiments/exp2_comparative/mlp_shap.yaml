name: exp2_mlp_shap
version: '1.0'
dataset: adult
random_seed: 42
model:
  name: adult_mlp
  path: experiments/exp1_adult/models/mlp.joblib
  type: mlp
explainer:
  method: shap
  params:
    n_background_samples: 50
  explainer_type: kernel
sampling:
  strategy: stratified
  samples_per_class: 10
  random_seed: 42
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
output_dir: experiments/exp2_comparative/results/mlp_shap
