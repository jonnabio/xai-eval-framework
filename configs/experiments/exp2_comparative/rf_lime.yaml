name: exp2_rf_lime
version: '1.0'
dataset: adult
random_seed: 42
model:
  name: adult_rf
  path: experiments/exp1_adult/models/rf.joblib
  type: rf
explainer:
  method: lime
  params:
    kernel_width: 3.0
sampling:
  strategy: stratified
  samples_per_class: 10
  random_seed: 42
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
output_dir: experiments/exp2_comparative/results/rf_lime
