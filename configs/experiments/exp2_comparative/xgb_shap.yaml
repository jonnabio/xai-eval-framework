name: exp2_xgb_shap
version: '1.0'
dataset: adult
random_seed: 42
model:
  name: adult_xgb
  path: experiments/exp1_adult/models/xgb.joblib
  type: xgb
explainer:
  method: shap
  params:
    n_background_samples: 50
  explainer_type: tree
sampling:
  strategy: stratified
  samples_per_class: 10
  random_seed: 42
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
output_dir: experiments/exp2_comparative/results/xgb_shap
