name: exp2_xgb_anchors_s123_n200
version: '2.0'
dataset: adult
random_seed: 123
model:
  name: adult_xgb
  path: experiments\exp1_adult\models\xgb.joblib
  type: xgb
explainer:
  method: anchors
  params:
    threshold: 0.95
sampling:
  strategy: stratified
  samples_per_class: 200
  random_seed: 123
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/xgb_anchors/seed_123/n_200
