name: exp2_rf_lime_s456_n50
version: '2.0'
dataset: adult
random_seed: 456
model:
  name: adult_rf
  path: experiments\exp1_adult\models\rf.joblib
  type: rf
explainer:
  method: lime
  params:
    kernel_width: 3.0
    num_samples: 1000
sampling:
  strategy: stratified
  samples_per_class: 50
  random_seed: 456
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/rf_lime/seed_456/n_50
