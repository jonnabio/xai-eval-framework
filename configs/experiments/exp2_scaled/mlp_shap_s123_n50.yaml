name: exp2_mlp_shap_s123_n50
version: '2.0'
dataset: adult
random_seed: 123
model:
  name: adult_mlp
  path: experiments/exp1_adult/models/mlp.joblib
  type: mlp
explainer:
  method: shap
  params:
    n_background_samples: 50
  explainer_type: kernel
sampling:
  strategy: stratified
  samples_per_class: 50
  random_seed: 123
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/mlp_shap/seed_123/n_50
