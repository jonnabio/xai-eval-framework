name: exp2_svm_anchors_s456_n100
version: '2.0'
dataset: adult
random_seed: 456
model:
  name: adult_svm
  path: experiments/exp1_adult/models/svm.joblib
  type: svm
explainer:
  method: anchors
  params:
    threshold: 0.95
sampling:
  strategy: stratified
  samples_per_class: 100
  random_seed: 456
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/svm_anchors/seed_456/n_100
max_workers: 2
