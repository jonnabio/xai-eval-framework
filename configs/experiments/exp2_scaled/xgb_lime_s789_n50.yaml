name: exp2_xgb_lime_s789_n50
version: '2.0'
dataset: adult
random_seed: 789
model:
  name: adult_xgb
  path: experiments\exp1_adult\models\xgb.joblib
  type: xgb
explainer:
  method: lime
  params:
    kernel_width: 3.0
    num_samples: 1000
sampling:
  strategy: stratified
  samples_per_class: 50
  random_seed: 789
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/xgb_lime/seed_789/n_50
