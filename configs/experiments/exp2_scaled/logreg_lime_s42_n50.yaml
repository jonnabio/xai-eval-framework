name: exp2_logreg_lime_s42_n50
version: '2.0'
dataset: adult
random_seed: 42
model:
  name: adult_logreg
  path: experiments/exp1_adult/models/logreg.joblib
  type: logreg
explainer:
  method: lime
  params:
    kernel_width: 3.0
    num_samples: 1000
sampling:
  strategy: stratified
  samples_per_class: 50
  random_seed: 42
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/logreg_lime/seed_42/n_50
