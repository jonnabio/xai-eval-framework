name: exp2_logreg_anchors_s42_n50
version: '2.0'
dataset: adult
random_seed: 42
model:
  name: adult_logreg
  path: experiments\exp1_adult\models\logreg.joblib
  type: logreg
explainer:
  method: anchors
  params:
    threshold: 0.95
sampling:
  strategy: stratified
  samples_per_class: 50
  random_seed: 42
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/logreg_anchors/seed_42/n_50
