name: exp2_xgb_dice_s999_n200
version: '2.0'
dataset: adult
random_seed: 999
model:
  name: adult_xgb
  path: experiments/exp1_adult/models/xgb.joblib
  type: xgb
explainer:
  method: dice
  params:
    num_counterfactuals: 5
sampling:
  strategy: stratified
  samples_per_class: 200
  random_seed: 999
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: true
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/xgb_dice/seed_999/n_200
