name: exp2_xgb_anchors_s999_n100
version: '2.0'
dataset: adult
random_seed: 999
model:
  name: adult_xgb
  path: experiments/exp1_adult/models/xgb.joblib
  type: xgb
explainer:
  method: anchors
  params:
    threshold: 0.95
sampling:
  strategy: stratified
  samples_per_class: 100
  random_seed: 999
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/xgb_anchors/seed_999/n_100
