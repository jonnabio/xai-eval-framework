name: exp2_logreg_dice_s789_n100
version: '2.0'
dataset: adult
random_seed: 789
model:
  name: adult_logreg
  path: experiments\exp1_adult\models\logreg.joblib
  type: logreg
explainer:
  method: dice
  params:
    num_counterfactuals: 5
sampling:
  strategy: stratified
  samples_per_class: 100
  random_seed: 789
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: true
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/logreg_dice/seed_789/n_100
