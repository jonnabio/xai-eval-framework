name: exp2_logreg_anchors_s123_n100
version: '2.0'
dataset: adult
random_seed: 123
model:
  name: adult_logreg
  path: experiments/exp1_adult/models/logreg.joblib
  type: logreg
explainer:
  method: anchors
  params:
    threshold: 0.95
sampling:
  strategy: stratified
  samples_per_class: 100
  random_seed: 123
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/logreg_anchors/seed_123/n_100
