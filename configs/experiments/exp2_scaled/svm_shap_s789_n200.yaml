name: exp2_svm_shap_s789_n200
version: '2.0'
dataset: adult
random_seed: 789
model:
  name: adult_svm
  path: experiments\exp1_adult\models\svm.joblib
  type: svm
explainer:
  method: shap
  params:
    n_background_samples: 50
  explainer_type: kernel
sampling:
