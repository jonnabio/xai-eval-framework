name: exp2_logreg_shap_s999_n200
version: '2.0'
dataset: adult
random_seed: 999
model:
  name: adult_logreg
  path: experiments\exp1_adult\models\logreg.joblib
  type: logreg
explainer:
  method: shap
  params:
    n_background_samples: 50
  explainer_type: kernel
sampling:
  strategy: stratified
  samples_per_class: 200
  random_seed: 999
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/logreg_shap/seed_999/n_200
