name: exp2_rf_dice_s123_n200
version: '2.0'
dataset: adult
random_seed: 123
model:
  name: adult_rf
  path: experiments\exp1_adult\models\rf.joblib
  type: rf
explainer:
  method: dice
  params:
    num_counterfactuals: 5
sampling:
  strategy: stratified
  samples_per_class: 200
  random_seed: 123
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
