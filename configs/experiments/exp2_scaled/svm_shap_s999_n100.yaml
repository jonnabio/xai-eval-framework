name: exp2_svm_shap_s999_n100
version: '2.0'
dataset: adult
random_seed: 999
model:
  name: adult_svm
  path: experiments/exp1_adult/models/svm.joblib
  type: svm
explainer:
  method: shap
  params:
    n_background_samples: 50
  explainer_type: kernel
sampling:
  strategy: stratified
  samples_per_class: 100
  random_seed: 999
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/svm_shap/seed_999/n_100
