name: exp2_logreg_lime_s789_n200
version: '2.0'
dataset: adult
random_seed: 789
model:
  name: adult_logreg
  path: experiments\exp1_adult\models\logreg.joblib
  type: logreg
explainer:
  method: lime
  params:
    kernel_width: 3.0
    num_samples: 1000
sampling:
