name: exp2_mlp_dice_s123_n200
version: '2.0'
dataset: adult
random_seed: 123
model:
  name: adult_mlp
  path: experiments\exp1_adult\models\mlp.joblib
  type: mlp
explainer:
  method: dice
  params:
    num_counterfactuals: 5
sampling:
  strategy: stratified
  samples_per_class: 200
  random_seed: 123
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: true
  stability_perturbations: 15
output_dir: experiments/exp2_scaled/results/mlp_dice/seed_123/n_200
