name: "exp1_adult_xgb_shap"
description: "Experiment 1: Adult dataset with XGBoost and SHAP explanations"
dataset: "adult"
version: "1.0.0"
random_seed: 42

model:
  name: "xgboost"
  path: "experiments/exp1_adult/models/xgboost/xgb_model.pkl"

explainer:
  method: "shap"
  explainer_type: "tree"

sampling:
  strategy: "stratified"
  samples_per_class: 25  # 50 total
  random_seed: 42

metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  stability_perturbations: 10
  stability_noise_level: 0.1

output_dir: "experiments/exp1_adult/results/xgb_shap"
