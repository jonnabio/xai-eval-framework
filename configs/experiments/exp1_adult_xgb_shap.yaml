name: "exp1_xgb_shap"
dataset: "adult"
description: "XGBoost with SHAP explanation"
random_seed: 42
version: "1.0.0"

model:
  name: "xgboost"
  path: "experiments/exp1_adult/models/xgboost/xgb_model.pkl"

explainer:
  method: "shap"
  explainer_type: "tree"
  params:
    check_additivity: false
    approximate: true

sampling:
  strategy: "stratified"
  samples_per_class: 50
  random_seed: 42

metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  stability_perturbations: 10
  stability_noise_level: 0.1

output_dir: "experiments/exp1_adult/results/xgb_shap"
