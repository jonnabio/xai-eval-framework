name: exp3_german_credit_rf_anchors_s42_n100
version: '3.0'
dataset: german_credit
random_seed: 42
model:
  name: german_credit_rf
  path: experiments/exp3_cross_dataset/models/german_credit/rf/seed_42/rf.joblib
  type: rf
explainer:
  method: anchors
  params:
    threshold: 0.95
sampling:
  strategy: stratified
  samples_per_class: 100
  random_seed: 42
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
max_workers: 1
output_dir: experiments/exp3_cross_dataset/results/german_credit/rf_anchors/seed_42/n_100
