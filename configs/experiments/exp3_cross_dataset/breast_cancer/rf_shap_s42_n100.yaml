name: exp3_breast_cancer_rf_shap_s42_n100
version: '3.0'
dataset: breast_cancer
random_seed: 42
model:
  name: breast_cancer_rf
  path: experiments/exp3_cross_dataset/models/breast_cancer/rf/seed_42/rf.joblib
  type: rf
explainer:
  method: shap
  params:
    n_background_samples: 50
  explainer_type: tree
sampling:
  strategy: stratified
  samples_per_class: 100
  random_seed: 42
metrics:
  fidelity: true
  stability: true
  sparsity: true
  cost: true
  domain: false
  counterfactual: false
  stability_perturbations: 15
max_workers: 1
output_dir: experiments/exp3_cross_dataset/results/breast_cancer/rf_shap/seed_42/n_100
