services:
  - type: web
    name: xai-eval-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: exec python -m uvicorn src.api.main:app --host 0.0.0.0 --port ${PORT:-10000} --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        sync: false # Set in dashboard
      - key: SENTRY_DSN
        sync: false # Set in dashboard
