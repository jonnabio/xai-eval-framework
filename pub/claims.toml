[meta]
version = 1

[thesis]
title = "Marco para la Evaluación Multinivel de la Explicabilidad en IA: Integración de Benchmarking Técnico, Protocolo Reproducible (FOM-7) y Taxonomía de Métricas"

resumen_es = """
Esta tesis propone un marco de evaluación multinivel para la Inteligencia Artificial Explicable (XAI) orientado a comparar métodos agnósticos al modelo bajo condiciones de benchmarking controladas y reproducibles. El trabajo responde a la “crisis de evaluación” en XAI articulando tres componentes complementarios: (i) un protocolo de operación reproducible de siete puertas (FOM-7) que conecta diseño experimental, calificación de artefactos e inferencia estadística admisible; (ii) un benchmark cuantitativo multi-métrico sobre datos tabulares reales que evalúa SHAP, LIME, Anchors y DiCE en cinco familias de modelos; y (iii) una taxonomía estructurada del espacio de métricas de evaluación XAI organizada en cuatro ejes (objetivo de evaluación, fuente de evidencia, propiedad de calidad y contexto de tarea).

El estudio empírico integra tres fases. EXP1 calibra la reproducibilidad del protocolo; EXP2 ejecuta el benchmark confirmativo sobre UCI Adult Income y operacionaliza cinco métricas primarias: fidelidad, estabilidad, parsimonia, brecha de fidelidad (*faithfulness gap*) y coste computacional; y EXP3 añade una validación externa compacta sobre Breast Cancer y German Credit. La inferencia confirmativa de EXP2 se apoya en comparaciones no paramétricas con control de multiplicidad y en un análisis pareado SHAP–LIME para cuantificar el trade-off calidad–coste, mientras que EXP3 se reporta como evidencia descriptiva de portabilidad. Los resultados muestran diferencias grandes y consistentes entre métodos: SHAP domina en fidelidad y estabilidad en Adult y conserva esa ventaja en EXP3 (fidelidad media 0.702 y estabilidad 0.873 frente a 0.319 y 0.533 para Anchors). LIME resulta competitivo cuando la latencia es crítica, a costa de explicaciones estructuralmente inestables, y Anchors y DiCE se posicionan como enfoques con objetivos explicativos cualitativamente distintos a la atribución de características. En conjunto, la tesis aporta un protocolo portable y un marco conceptual que permiten seleccionar métodos XAI en función de objetivos operativos y acumular evidencia de forma reproducible.
"""

palabras_clave_es = [
  "inteligencia artificial explicable (XAI)",
  "evaluación multimétrica",
  "benchmarking reproducible",
  "protocolo FOM-7",
  "atribución de características",
  "explicaciones contrafactuales",
  "datos tabulares",
]

abstract_en = """
This thesis proposes a multilevel evaluation framework for Explainable Artificial Intelligence (XAI) aimed at comparing model-agnostic explainers under controlled and reproducible benchmarking conditions. To address the evaluation fragmentation in XAI, the framework integrates three complementary components: (i) a seven-gate operational protocol (FOM-7) that links experimental design, artifact qualification, and statistically admissible inference; (ii) a multi-metric quantitative benchmark on real-world tabular data evaluating SHAP, LIME, Anchors, and DiCE across five model families; and (iii) a structured taxonomy of XAI evaluation metrics organized along four axes (evaluation target, evidence source, quality property, and task context).

The empirical study integrates three phases. EXP1 calibrates protocol reproducibility; EXP2 conducts the confirmatory benchmark on UCI Adult Income and operationalizes five primary metrics: faithfulness, stability, parsimony, faithfulness gap, and computational cost; and EXP3 adds compact external validation on Breast Cancer and German Credit. Confirmatory inference for EXP2 relies on nonparametric comparisons with multiplicity control and on a paired SHAP–LIME analysis to quantify the quality–cost trade-off, whereas EXP3 is reported as descriptive portability evidence. Results show large and consistent differences across methods: SHAP dominates in faithfulness and stability on Adult and preserves that advantage in EXP3 (mean faithfulness 0.702 and stability 0.873 versus 0.319 and 0.533 for Anchors). LIME becomes attractive when latency constraints dominate, at the cost of structurally unstable explanations, and Anchors and DiCE address qualitatively different explanatory objectives than feature attribution. Overall, the thesis contributes a portable protocol and a conceptual framework to support operationally grounded XAI method selection and reproducible evidence accumulation.
"""

keywords_en = [
  "explainable AI (XAI)",
  "multi-metric evaluation",
  "reproducible benchmarking",
  "FOM-7 protocol",
  "feature attribution",
  "counterfactual explanations",
  "tabular data",
]

[papers.paper_a]
abstract_en_tex = """
Evaluating explainability methods requires more than a single faithfulness proxy. We present a modular benchmarking framework centered on quantitative XAI quality metrics: fidelity, stability, sparsity, computational cost, and faithfulness gap, plus an explicit method for operating the framework end-to-end. On the UCI Adult benchmark, we use a staged evidence protocol: a calibration/reproducibility stage (EXP1) followed by a primary comparative/robustness benchmark (EXP2); the current merged recovery snapshot contains 299 committed result artifacts (99.7\\% artifact coverage) plus a 30-row SHAP recovery batch, yielding 275 analyzable unique runs out of 300 planned cells (91.7\\%). Across complete model-size blocks ($5$ models, $N \\in \\{50,100,200\\}$), Friedman tests indicate significant method differences for fidelity ($\\chi^2=42.12$, $p=3.78\\times10^{-9}$), stability ($\\chi^2=40.68$, $p=7.65\\times10^{-9}$), sparsity ($\\chi^2=35.64$, $p=8.92\\times10^{-8}$), faithfulness gap ($\\chi^2=45.00$, $p=9.25\\times10^{-10}$), and runtime ($\\chi^2=30.44$, $p=1.12\\times10^{-6}$). SHAP leads on fidelity/stability, DiCE leads on sparsity, and LIME remains fastest overall. A completed EXP3 portability check adds 24/24 runs on Breast Cancer and German Credit, where SHAP again exceeds Anchors in mean fidelity (0.702 versus 0.319) and stability (0.873 versus 0.533), while Anchors remains more compact. We release the framework, operation protocol, and artifacts with explicit data-quality caveats for reproducible benchmark use under a quantitative-only claim scope.
"""
keywords_en_tex = "Explainable AI, benchmark methodology, reproducibility, statistical evaluation, model-agnostic explanations"

[papers.paper_b]
abstract_en_tex = """
LIME and SHAP are widely used explainability methods, yet guidance on when each is preferable remains limited and often anecdotal. This paper presents a focused paired empirical comparison of the two methods on tabular data using five primary technical metrics under a controlled benchmarking protocol. Across 75 matched SHAP-LIME cells in the Adult benchmark, SHAP dominates on stability, fidelity, and faithfulness gap, while LIME yields systematically sparser explanations and lower runtime in most contexts. The cost trade-off is statistically significant but heterogeneous across model families: matched-cell medians are 684.1 ms for SHAP versus 65.7 ms for LIME, whereas means are 11,708.3 ms versus 3,660.7 ms because kernel-SHAP tails are heavy. A downstream EXP3 validation package does not extend the paired SHAP-LIME test because LIME is absent by design, but it supports the portability of the SHAP quality signal against Anchors across Breast Cancer and German Credit. These findings support objective-driven deployment guidance: SHAP for high-assurance auditing and LIME for latency-sensitive user-facing explanation workflows.
"""
keywords_en_tex = "explainable ai, lime, shap, interpretability, robustness benchmarking"

[papers.paper_c]
abstract_en_tex = """
Evaluation remains the least consolidated part of explainable artificial intelligence (XAI). While model-agnostic post-hoc methods such as LIME, SHAP, Anchors, and DiCE are widely used, the criteria used to judge them vary sharply across papers, toolkits, and application domains. Some studies emphasize faithfulness proxies, others prioritize stability, sparsity, or human plausibility, and newer work introduces large language models (LLMs) as semantic evaluators without a unified framework for locating those judgments within the broader evaluation landscape. This paper presents a structured survey and taxonomy of evaluation metrics for model-agnostic explainability, focusing on how technical proxy metrics, benchmark-grounded metrics, human evaluation, and LLM-based semantic evaluation relate to one another. Using a cleaned 24-study coded review corpus derived from the thesis literature matrix, we organize XAI evaluation along four axes: evaluation target, evidence source, quality property, and task context. The taxonomy is grounded back into the thesis evidence stack: EXP1 supplies reproducibility evidence, EXP2 supplies confirmatory Adult benchmark evidence, and EXP3 supplies compact external-validation evidence on Breast Cancer and German Credit. The resulting taxonomy clarifies where current metrics overlap, where they leave construct gaps, and why semantic evaluation should be treated as a complementary layer rather than a replacement for robustness- and fidelity-oriented measurement. The paper closes by mapping the taxonomy back to the thesis framework, motivating the benchmark design of Paper B and the evaluator-validation agenda of Paper A.
"""
keywords_en_tex = "explainable ai, evaluation metrics, survey, taxonomy, semantic evaluation, llm-as-a-judge"
