# Experiment 1: Adult Dataset - XGBoost Configuration
# =========================================================

# -----------------------------------------------------------------------------
# 1. Model Configuration
# -----------------------------------------------------------------------------
model:
  type: "XGBClassifier"
  
  # Hyperparameters
  params:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    objective: "binary:logistic"
    eval_metric: "logloss"
    n_jobs: -1
    random_state: 42
    use_label_encoder: false

# -----------------------------------------------------------------------------
# 2. Training Configuration
# -----------------------------------------------------------------------------
training:
  test_size: 0.2
  random_state: 42

# -----------------------------------------------------------------------------
# 3. Output Configuration
# -----------------------------------------------------------------------------
output:
  # Directory where trained .pkl models and metrics will be saved.
  models_dir: "experiments/exp1_adult/models/xgboost"
  
  # Note: XGBoostTrainer saves everything to the path provided to save(), 
  # which assumes models_dir in the wrapper script.
  model_filename: "xgb_model.pkl"

# -----------------------------------------------------------------------------
# 4. Validation Configuration
# -----------------------------------------------------------------------------
validation:
  min_accuracy: 0.80
  min_roc_auc: 0.85
